<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vitsoe 606 Designer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="library">
    <h2>606 Designer</h2>
    <div id="cost-panel">
      <h3 class="collapsible-header" id="cost-header"><span class="collapse-arrow">↓</span> Cost Estimate</h3>
      <div id="cost-body" class="collapsible-content">
        <div id="cost-items"></div>
        <div id="cost-total">
          <span>Total</span>
          <span id="cost-total-amount">$0</span>
        </div>
      </div>
    </div>
    <div id="library-items"></div>
    <div id="export-panel">
      <h3 class="collapsible-header" id="export-header"><span class="collapse-arrow">→</span> Export</h3>
      <div id="export-body" class="collapsible-content collapsed">
        <button class="export-btn" id="export-png">Export PNG</button>
        <button class="export-btn" id="export-svg">Export SVG</button>
        <button class="export-btn" id="export-pdf">Export PDF</button>
        <label class="export-option" id="pdf-price-option">
          <input type="checkbox" id="pdf-include-prices" checked> Include price list
        </label>
      </div>
    </div>
  </div>
  <div id="canvas-wrapper">
    <div id="canvas"></div>
    <button id="clear-btn" title="Clear all elements">Clear All</button>
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <span id="zoom-level">40%</span>
      <button id="zoom-out" title="Zoom out">−</button>
      <button id="zoom-fit" title="Fit to screen">Fit</button>
    </div>
  </div>
  <div id="context-menu" class="context-menu hidden"></div>
  <div id="drag-ghost" class="drag-ghost hidden"></div>
  <script src="https://unpkg.com/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
